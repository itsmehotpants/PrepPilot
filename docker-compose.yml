version: "3.9"

# ─────────────────────────────────────────────────────────────
# PrepPilot — Docker Compose
#
# Services:
#   ollama   — local LLM server (auto pulls llama3.2 on first run)
#   preppilot — the interview assistant (text mode)
#
# Usage:
#   docker compose up              # start everything
#   docker compose up --build      # rebuild after code changes
#   docker compose down            # stop & remove containers
# ─────────────────────────────────────────────────────────────

services:

  # ── Ollama LLM server ──────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: preppilot-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama   # persists downloaded models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Model pull (runs once, then exits) ────────────────────
  ollama-pull:
    image: ollama/ollama:latest
    container_name: preppilot-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "ollama pull llama3.2"
    restart: "no"

  # ── PrepPilot app ─────────────────────────────────────────
  preppilot:
    build: .
    container_name: preppilot-app
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434   # point app to ollama service
    stdin_open: true    # keep stdin open for text input
    tty: true           # allocate a TTY for colored output
    restart: unless-stopped

volumes:
  ollama_data:    # named volume — Ollama models persist across restarts
